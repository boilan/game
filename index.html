<!doctype HTML>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Crossy Road - Render</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="app-store-interstitial.css" />
</head>
<body>
    <div class="worldSwitcher">
        <button class="worldSwitcher__button" data-world="original" type="button">
            <img alt="Original" src="assets/original-s-v2.png" width="176" height="88">
        </button>
        <button class="worldSwitcher__button" data-world="space" type="button">
            <img alt="Space" src="assets/space-s-v2.png" width="176" height="88">
        </button>
        <button class="worldSwitcher__button" data-world="dinosaur" type="button">
            <img alt="Dinosaur" src="assets/dinosaur-blue-s-v2.png" width="176" height="88">
        </button>
    </div>

    <script>
        window.PokiSDK = {
            init: function() { return Promise.resolve(); },
            gameLoadingStart: function() {},
            gameLoadingFinished: function() {},
            gameplayStart: function() {},
            gameplayStop: function() {},
            commercialBreak: function() { return Promise.resolve(); }
        };
    </script>

<script src="three.min.js"></script>
<script src="asset-loader.min.js"></script>
<script src="extra.min.js"></script>
<script src="game.min.js"></script>
<script src="bootstrap.min.js"></script>
</body>
</html>

<script>
    window.onload = function() {
        console.log("Página cargada. Iniciando motor...");
        // Si el canvas no aparece, forzamos la inicialización aquí
        if (!document.querySelector('canvas')) {
            // Intentamos disparar el evento que espera el juego
            window.dispatchEvent(new Event('resize'));
        }
    };
</script>

<!doctype HTML>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Crossy Road - Fixed</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="app-store-interstitial.css" />

    <script type="text/javascript">
        window.PokiSDK = {
            init: function() { return Promise.resolve(); },
            gameLoadingFinished: function() {},
            gameplayStart: function() {},
            gameplayStop: function() {},
            commercialBreak: function() { return Promise.resolve(); }
        };
    </script>
</head>
<body>

    <div id="container" style="width:100vw; height:100vh; display:block;"></div>

    <div class="worldSwitcher">
        <button class="worldSwitcher__button" data-world="original" type="button">
            <img alt="Original" src="original-s-v2.png" width="176" height="88">
        </button>
        <button class="worldSwitcher__button" data-world="space" type="button">
            <img alt="Space" src="space-s-v2.png" width="176" height="88">
        </button>
        <button class="worldSwitcher__button" data-world="dinosaur" type="button">
            <img alt="Dinosaur" src="dinosaur-blue-s-v2.png" width="176" height="88">
        </button>
    </div>

    <script src="three.min.js"></script>
    <script src="asset-loader.min.js"></script>
    <script src="extra.min.js"></script>
    <script src="game.min.js"></script>
    <script src="bootstrap.min.js"></script>

    <script>
        window.onload = function() {
            console.log("Iniciando secuencia de arranque...");
            
            // Forzamos un retraso de 1 segundo para que todo el JS se asiente
            setTimeout(function() {
                const container = document.getElementById('container');
                const canvas = document.querySelector('canvas');

                if (!canvas) {
                    console.warn("Canvas no encontrado. Forzando al motor...");
                    // Disparamos los eventos que el juego espera para 'despertar'
                    window.dispatchEvent(new Event('resize'));
                    if(window.PokiSDK) window.PokiSDK.gameLoadingFinished();
                } else {
                    console.log("¡Canvas creado con éxito!");
                }
            }, 1000);
        };
    </script>

</body>
</html>

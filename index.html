<!doctype HTML>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Crossy Road</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="app-store-interstitial.css" />

    <script type="text/javascript">
        window.PokiSDK = {
            init: function() { return Promise.resolve(); },
            gameLoadingFinished: function() {},
            gameplayStart: function() {},
            gameplayStop: function() {},
            commercialBreak: function() { return Promise.resolve(); }
        };
    </script>
</head>
<body>

    <div id="container"></div>

    <div class="worldSwitcher">
        <button class="worldSwitcher__button" data-world="original" type="button">
            <img alt="Original" src="original-s-v2.png" width="176" height="88">
        </button>
        <button class="worldSwitcher__button" data-world="space" type="button">
            <img alt="Space" src="space-s-v2.png" width="176" height="88">
        </button>
        <button class="worldSwitcher__button" data-world="dinosaur" type="button">
            <img alt="Dinosaur" src="dinosaur-blue-s-v2.png" width="176" height="88">
        </button>
    </div>

    <script src="three.min.js"></script>
    <script src="asset-loader.min.js"></script>
    <script src="extra.min.js"></script>
    <script src="game.min.js"></script>
    <script src="bootstrap.min.js"></script>

    <script>
        // ESTE BLOQUE ES EL QUE ACTIVA EL JUEGO
        window.onload = function() {
            console.log("Forzando inicio del juego...");
            setTimeout(function() {
                // 1. Notificamos que la carga terminó
                if (window.PokiSDK && window.PokiSDK.gameLoadingFinished) {
                    window.PokiSDK.gameLoadingFinished();
                }
                // 2. Forzamos al motor 3D a redibujarse
                window.dispatchEvent(new Event('resize'));
                
                // 3. Verificamos si el canvas se creó
                const canvas = document.querySelector('canvas');
                if (canvas) {
                    console.log("¡Canvas detectado! El juego debería ser visible.");
                } else {
                    console.warn("Aún no hay canvas. Revisa si los .js cargaron bien.");
                }
            }, 1500);
        };
    </script>
</body>
</html>
